name: Container Images

on:
  push:
    branches:
      - main
    paths:
      - "packages/**/riela-package.json"
      - "packages/**/Containerfile"
      - "packages/**/Dockerfile"
      - "packages/**/addons/**"
      - ".agents/skills/riela-package-release/scripts/container-image-matrix.ts"
      - ".github/workflows/container-images.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: container-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    name: Discover Container Add-ons
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      has-images: ${{ steps.matrix.outputs.has-images }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Build matrix
        id: matrix
        run: |
          set -euo pipefail
          matrix="$(bun .agents/skills/riela-package-release/scripts/container-image-matrix.ts --format matrix)"
          count="$(printf '%s' "$matrix" | jq '.include | length')"
          printf 'matrix=%s\n' "$matrix" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then
            printf 'has-images=true\n' >> "$GITHUB_OUTPUT"
          else
            printf 'has-images=false\n' >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.packageId }}
    needs: discover
    if: needs.discover.outputs.has-images == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=${{ matrix.packageName }}
            org.opencontainers.image.description=Riela node add-on container image
            org.opencontainers.image.version=${{ matrix.packageVersion }}
          tags: |
            ${{ matrix.image }}
            ${{ matrix.imageBase }}:sha-${{ github.sha }}

      - name: Print digest
        env:
          PACKAGE_ID: ${{ matrix.packageId }}
          IMAGE: ${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          printf '%s\t%s@%s\n' "$PACKAGE_ID" "$IMAGE" "$DIGEST"
          mkdir -p dist/image-digests
          jq -n \
            --arg packageId "$PACKAGE_ID" \
            --arg image "$IMAGE" \
            --arg digest "$DIGEST" \
            '[{packageId: $packageId, image: $image, digest: $digest}]' \
            > "dist/image-digests/${PACKAGE_ID}.json"

      - name: Upload digest pin
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: container-image-digest-${{ matrix.packageId }}
          path: dist/image-digests/${{ matrix.packageId }}.json
          if-no-files-found: error
          retention-days: 14
