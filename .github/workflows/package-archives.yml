name: Package Archives

on:
  push:
    branches:
      - main
    paths:
      - "packages/**"
      - ".agents/skills/riela-package-release/scripts/pack-release-archives.ts"
      - ".agents/skills/riela-package-release/scripts/generate-registry-index.ts"
      - ".github/workflows/package-archives.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-archives-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Pack and Publish Package Archives
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Pack package archives
        env:
          RELEASE_TAG: registry-packages
          ARCHIVE_BASE_URL: https://github.com/${{ github.repository }}/releases/download/registry-packages
        run: |
          set -euo pipefail
          bun .agents/skills/riela-package-release/scripts/pack-release-archives.ts \
            --all \
            --archive-base-url "$ARCHIVE_BASE_URL"
          bun .agents/skills/riela-package-release/scripts/generate-registry-index.ts \
            --output dist/registry-index.json \
            --archive-manifest dist/package-archives.json

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: registry-packages
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --target "$TARGET_SHA" \
              --title "Riela package archives" \
              --notes "Generated .rielapkg archives and registry index for the distributed package registry."
          fi
          gh release upload "$RELEASE_TAG" \
            dist/rielapkg/*.rielapkg \
            dist/package-archives.json \
            dist/registry-index.json \
            --clobber
